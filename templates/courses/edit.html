{% extends "base.html" %}

{% block title %}Edit {{ course.title }}{% endblock %}

{% block content header %}
<a href="{{ url_for('courses.show_all') if context == 'courses' else url_for('dashboard.index') }}">←</a>
<h1 class="content-title">Edit Course</h1>
{% endblock %}

{% block content %}
<form method="POST">
    <label>Title:
        <input type="text" name="title" value="{{course.title}}">
    </label>
    <label>Description:
        <input type="text" name="description" value="{{course.title}}">
    </label>
    <label>Start Date:
        <input type="text" name="start-date" value="{{course.title}}">
    </label>
    <label>End Date:
        <input type="text" name="end-date" value="{{course.title}}">
    </label>

    <button type="submit">Create Course</button>
</form>
<a href="{{ url_for('courses.show_one', course_id=course.id) }}">Cancel</a>
{% endblock %}
