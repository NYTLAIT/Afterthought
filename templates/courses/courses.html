{% extends "base.html" %}
{% block title %}Courses{% endblock %}

{% block content_header %}
<h1 class="content-title">Your Courses</h1>
{% endblock %}

{% block content %}
<div class="section-header">
    <h2></h2>
    <a class="btn btn-primary" href="{{ url_for('courses.new', context='courses') }}">+ New Course</a>
</div>

<div class="list">
    {% for course in courses %}
    <a class="list-item" href="{{ url_for('courses.show_one', course_id=course.id, context='courses') }}">
        <h3>{{ course.title }}</h3>
    </a>
    {% else %}
    <p class="muted">No courses yet.</p>
    {% endfor %}
</div>
{% endblock %}
